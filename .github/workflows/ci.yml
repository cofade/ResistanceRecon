name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Layer 4 — three parallel jobs. AMRFinderPlus / Docker / WSL2 are NEVER run in CI;
# the test job drives the full pipeline through MockAnnotator + committed fixture TSVs.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - name: Ruff (lint)
        run: uv run ruff check src/ tests/
      - name: Ruff (format)
        run: uv run ruff format --check src/ tests/
      - name: Mypy (strict)
        run: uv run mypy src/
      - name: LLM import-boundary (predictor/features/reader must not import llm/)
        run: uv run python scripts/check_import_boundary.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - name: Pytest (coverage >= 80, no Docker/bio-tools)
        run: uv run pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - name: Bandit (high severity)
        run: uv run bandit -r src/ --severity-level high
